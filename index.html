<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Classroom</title>
  <link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png" type="image/x-icon">
  <style>
    :root {
      --bg-color: #0a0a0a;
      --card-bg: #1a1a1a;
      --accent-color: #007bff;
      --text-color: #ffffff;
      --demon-red: #ff4d4d;
    }
    body { margin: 0; min-height: 100vh; background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; }
    nav { width: 100%; background: #111; display: flex; justify-content: center; padding: 15px 0; border-bottom: 2px solid #333; margin-bottom: 40px; }
    .tab-btn { background: none; border: none; color: #888; font-size: 18px; font-weight: bold; padding: 10px 30px; cursor: pointer; transition: 0.3s; }
    .tab-btn.active { color: var(--text-color); border-bottom: 2px solid var(--accent-color); }
    .tab-content { display: none; width: 90%; max-width: 800px; flex-direction: column; gap: 15px; align-items: center; }
    .tab-content.active { display: flex; padding-bottom: 20px; }
    button.level-btn { width: 100%; padding: 20px; font-size: 20px; border: none; border-radius: 8px; cursor: pointer; background: var(--card-bg); color: white; transition: 0.2s; border-left: 5px solid var(--accent-color); }
    button.level-btn:hover { background: #252525; transform: translateX(10px); }
    .custom-input { background: #333 !important; border-left: 5px solid #00ff88 !important; }
  </style>
</head>

<body>

  <nav>
    <button class="tab-btn active" onclick="openTab('levels')">LEVELS</button>
    <button class="tab-btn" onclick="openTab('demonlist')">WBDL</button>
    <button class="tab-btn" onclick="openGoogleClassroom()">SWITCH TO GOOGLE CLASSROOM</button>
  </nav>

  <div id="levels" class="tab-content active">
    <button class="level-btn custom-input" onclick="openGDBrowser()">Open GDBrowser</button>
    <button class="level-btn custom-input" onclick="promptLevel()">Custom Level (from GD servers)</button>
    <button class="level-btn" onclick="loadLevel('-1')">Stereo Madness</button>
    <button class="level-btn" onclick="loadLevel('-23')">Every End</button>
    <button class="level-btn" onclick="loadLevel('-24')">The Triple Trial</button>
  </div>

  <div id="demonlist" class="tab-content">
     <h3>Web Browser Demonlist</h3>
     <p>Visit the <a href="https://webdemonlist.org" target="_blank">WBDL website</a>.</p>
   </div>

  <script>
    function openTab(tabName) {
      document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.getElementById(tabName).classList.add("active");
      event.currentTarget.classList.add("active");
    }

    function loadLevel(id) {
      window.location.href = `/game?id=${id}`;
    }

    function promptLevel() {
      const id = prompt('Enter level ID:');
      if (!id) return;
      if (!Number.isInteger(Number(id))) return alert("Invalid Level ID");
      loadLevel(id);
    }

    function openGDBrowser() {
      window.open('https://gdbrowser.com', '_blank');
    }

    function openGoogleClassroom() {
      window.location.href = 'https://classroom.google.com';
    }
  </script>
</body>
</html>
